# ServiceAccount, Role, RoleBinding, and CronJob to keep the ECR imagePullSecret fresh.
# The ECR token expires every 12 hours — this CronJob refreshes it every 6 hours.
# Uses the EC2 instance profile IAM role (no static credentials needed).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-refresher-sa
  namespace: bmi-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-refresher-role
  namespace: bmi-app
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-refresher-rolebinding
  namespace: bmi-app
subjects:
  - kind: ServiceAccount
    name: ecr-refresher-sa
    namespace: bmi-app
roleRef:
  kind: Role
  name: ecr-refresher-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-secret-refresher
  namespace: bmi-app
spec:
  schedule: "0 */6 * * *"   # Every 6 hours (ECR token lasts 12h)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-refresher-sa
          restartPolicy: OnFailure
          # Run on k8s-lab-worker-1 where the IAM instance profile is confirmed active
          nodeSelector:
            kubernetes.io/hostname: k8s-lab-worker-1
          containers:
            - name: refresher
              image: amazon/aws-cli:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Fetching ECR token via EC2 instance profile..."
                  TOKEN=$(aws ecr get-login-password --region ap-south-1)
                  echo "Refreshing ecr-credentials secret in bmi-app namespace..."
                  kubectl create secret docker-registry ecr-credentials \
                    --docker-server=388779989543.dkr.ecr.ap-south-1.amazonaws.com \
                    --docker-username=AWS \
                    --docker-password="$TOKEN" \
                    -n bmi-app \
                    --dry-run=client -o yaml | kubectl apply -f -
                  echo "ECR secret refreshed successfully."
              resources:
                requests:
                  cpu:    "50m"
                  memory: "64Mi"
                limits:
                  cpu:    "100m"
                  memory: "128Mi"
