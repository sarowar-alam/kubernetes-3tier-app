apiVersion: apps/v1
kind: Deployment
metadata:
  name: bmi-frontend
  namespace: bmi-app
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bmi-frontend
  template:
    metadata:
      labels:
        app: bmi-frontend
    spec:
      containers:
        - name: bmi-frontend
          image: 388779989543.dkr.ecr.ap-south-1.amazonaws.com/bmi-frontend:9b8bf6f
          imagePullPolicy: Always
          ports:
            - containerPort: 80

          resources:
            requests:
              cpu:    "50m"
              memory: "64Mi"
            limits:
              cpu:    "200m"
              memory: "128Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds:       30
            timeoutSeconds:      5

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds:       10
            timeoutSeconds:      5
      imagePullSecrets:
        - name: ecr-credentials
