apiVersion: apps/v1
kind: Deployment
metadata:
  name: bmi-frontend
  namespace: bmi-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bmi-frontend
  template:
    metadata:
      labels:
        app: bmi-frontend
    spec:
      containers:
        - name: bmi-frontend
          # TODO: Replace with your ECR image URL after pushing
          # Format: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/bmi-frontend:latest
          image: YOUR_AWS_ACCOUNT_ID.dkr.ecr.YOUR_REGION.amazonaws.com/bmi-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80

          resources:
            requests:
              cpu:    "50m"
              memory: "64Mi"
            limits:
              cpu:    "200m"
              memory: "128Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds:       30
            timeoutSeconds:      5

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds:       10
            timeoutSeconds:      5
      # No imagePullSecrets needed — ECR access is handled by the EC2 instance
      # profile on each node via the kubelet credential provider.
      # See k8s/setup-ecr-on-nodes.sh for one-time node setup instructions.
