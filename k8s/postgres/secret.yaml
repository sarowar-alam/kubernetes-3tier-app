apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: bmi-app
type: Opaque
# stringData accepts plain text — Kubernetes encodes it to base64 automatically.
# IMPORTANT: Change POSTGRES_PASSWORD before deploying to production.
stringData:
  POSTGRES_DB:       "bmidb"
  POSTGRES_USER:     "bmi_user"
  POSTGRES_PASSWORD: "0stad2025"
